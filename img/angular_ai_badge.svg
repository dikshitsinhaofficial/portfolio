<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2c0a1a"/>
      <stop offset="100%" stop-color="#05010b"/>
    </radialGradient>
    
    <!-- Angular/AI Gradient -->
    <linearGradient id="angularGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="50%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base Badge Background -->
  <circle cx="256" cy="256" r="230" fill="url(#bgGrad)" stroke="url(#angularGrad)" stroke-width="6" filter="url(#neonGlow)"/>

  <!-- Orbital Ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#d946ef" stroke-width="1.5" stroke-dasharray="10 15" opacity="0.3"/>

  <!-- Angular Shield Icon with AI Synapses Inside/Overlapping -->
  <g filter="url(#neonGlow)">
    <!-- Angular Outer Shield -->
    <path d="M 256,90 
             L 375,132 
             L 355,340 
             L 256,395 
             L 157,340 
             L 137,132 Z" 
          fill="none" 
          stroke="url(#angularGrad)" 
          stroke-width="8" 
          stroke-linejoin="round"/>
  </g>

  <!-- Glowing Neural Synapse Connections from Shield Center -->
  <g stroke="#ffffff" stroke-width="2" opacity="0.8">
    <!-- Synapse lines extending outward from center -->
    <line x1="256" y1="230" x2="210" y2="170"/>
    <line x1="256" y1="230" x2="302" y2="170"/>
    <line x1="256" y1="230" x2="200" y2="250"/>
    <line x1="256" y1="230" x2="312" y2="250"/>
    <line x1="256" y1="230" x2="220" y2="310"/>
    <line x1="256" y1="230" x2="292" y2="310"/>
    
    <!-- Central AI Core Node -->
    <circle cx="256" cy="230" r="12" fill="url(#angularGrad)" stroke="#ffffff" stroke-width="2.5" filter="url(#neonGlow)"/>
    
    <!-- Terminal Nodes -->
    <circle cx="210" cy="170" r="6" fill="#f43f5e"/>
    <circle cx="302" cy="170" r="6" fill="#8b5cf6"/>
    <circle cx="200" cy="250" r="6" fill="#d946ef"/>
    <circle cx="312" cy="250" r="6" fill="#f43f5e"/>
    <circle cx="220" cy="310" r="6" fill="#8b5cf6"/>
    <circle cx="292" cy="310" r="6" fill="#d946ef"/>
  </g>

  <!-- Big Stylized "A" in background but with glowing circuits -->
  <path d="M 256,120 L 330,285 H 300 L 256,190 L 212,285 H 182 Z" 
        fill="none" 
        stroke="url(#angularGrad)" 
        stroke-width="3" 
        opacity="0.3"/>
  <path d="M 225,245 H 287" 
        fill="none" 
        stroke="url(#angularGrad)" 
        stroke-width="3" 
        opacity="0.3"/>
</svg>
