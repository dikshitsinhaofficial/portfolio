<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1b0b2e"/>
      <stop offset="100%" stop-color="#03020c"/>
    </radialGradient>
    
    <!-- AI Cyber Gradient -->
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base Badge Background -->
  <circle cx="256" cy="256" r="230" fill="url(#bgGrad)" stroke="url(#aiGrad)" stroke-width="6" filter="url(#neonGlow)"/>

  <!-- AI Synapse Web Lines -->
  <g stroke="url(#aiGrad)" stroke-width="2.5" fill="none" filter="url(#neonGlow)" opacity="0.8">
    <!-- Brain Structure Connections -->
    <!-- Center Hub -->
    <circle cx="256" cy="256" r="16" fill="url(#aiGrad)" stroke="#fff" stroke-width="2"/>
    
    <!-- Inner Ring Nodes -->
    <line x1="256" y1="256" x2="200" y2="200"/>
    <line x1="256" y1="256" x2="312" y2="200"/>
    <line x1="256" y1="256" x2="200" y2="312"/>
    <line x1="256" y1="256" x2="312" y2="312"/>
    <line x1="256" y1="256" x2="256" y2="160"/>
    <line x1="256" y1="256" x2="256" y2="352"/>
    <line x1="256" y1="256" x2="160" y2="256"/>
    <line x1="256" y1="256" x2="352" y2="256"/>

    <!-- Outer Nodes and Cross connections -->
    <line x1="200" y1="200" x2="256" y2="160"/>
    <line x1="312" y1="200" x2="256" y2="160"/>
    <line x1="200" y1="200" x2="160" y2="256"/>
    <line x1="200" y1="312" x2="160" y2="256"/>
    <line x1="200" y1="312" x2="256" y2="352"/>
    <line x1="312" y1="312" x2="256" y2="352"/>
    <line x1="312" y1="200" x2="352" y2="256"/>
    <line x1="312" y1="312" x2="352" y2="256"/>

    <!-- Node circles -->
    <circle cx="200" cy="200" r="10" fill="#ec4899"/>
    <circle cx="312" cy="200" r="10" fill="#06b6d4"/>
    <circle cx="200" cy="312" r="10" fill="#8b5cf6"/>
    <circle cx="312" cy="312" r="10" fill="#ec4899"/>
    
    <circle cx="256" cy="160" r="12" fill="#8b5cf6"/>
    <circle cx="256" cy="352" r="12" fill="#06b6d4"/>
    <circle cx="160" cy="256" r="12" fill="#ec4899"/>
    <circle cx="352" cy="256" r="12" fill="#8b5cf6"/>
  </g>
  
  <!-- Additional micro connections and nodes -->
  <g fill="none" stroke="#fff" stroke-width="1" opacity="0.5">
    <circle cx="200" cy="200" r="18" stroke="#ec4899" stroke-dasharray="2 3"/>
    <circle cx="312" cy="200" r="18" stroke="#06b6d4" stroke-dasharray="2 3"/>
    <circle cx="200" cy="312" r="18" stroke="#8b5cf6" stroke-dasharray="2 3"/>
    <circle cx="312" cy="312" r="18" stroke="#ec4899" stroke-dasharray="2 3"/>
  </g>

  <!-- High-tech Outer Orbit Rings -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#aiGrad)" stroke-width="2" stroke-dasharray="80 120" opacity="0.5" filter="url(#neonGlow)"/>
  <circle cx="256" cy="256" r="205" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="20 40" opacity="0.3"/>
</svg>
