<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="ciscoBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00BCEB"/>
      <stop offset="100%" stop-color="#004B87"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="18" fill="url(#ciscoBg)"/>

  <!-- Cisco bridge bars (7 bars: short-tall-short) -->
  <!-- Bar 1 -->
  <rect x="42" y="95" width="12" height="18" rx="6" fill="white" opacity="0.95"/>
  <!-- Bar 2 -->
  <rect x="60" y="83" width="12" height="30" rx="6" fill="white" opacity="0.95"/>
  <!-- Bar 3 -->
  <rect x="78" y="68" width="12" height="45" rx="6" fill="white" opacity="0.95"/>
  <!-- Bar 4 (center tallest) -->
  <rect x="96" y="57" width="12" height="56" rx="6" fill="white"/>
  <!-- Bar 5 -->
  <rect x="114" y="68" width="12" height="45" rx="6" fill="white" opacity="0.95"/>
  <!-- Bar 6 -->
  <rect x="132" y="83" width="12" height="30" rx="6" fill="white" opacity="0.95"/>
  <!-- Bar 7 -->
  <rect x="150" y="95" width="12" height="18" rx="6" fill="white" opacity="0.95"/>

  <!-- cisco wordmark -->
  <text x="100" y="146" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="white" letter-spacing="3">cisco</text>
  <!-- Divider line -->
  <rect x="55" y="154" width="90" height="1.5" rx="1" fill="rgba(255,255,255,0.35)"/>
  <!-- Subtitle -->
  <text x="100" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" letter-spacing="2">NETWORKING ACADEMY</text>
</svg>
